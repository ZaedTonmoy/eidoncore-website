<!DOCTYPE html>
<html lang="en" data-depth="0">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Eidoncore</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.min.css">
    <link rel="stylesheet" href="components.min.css">
    <script src="components.min.js"></script>
</head>

<body>
    <main>
        <section class="page-header" style="min-height:60vh;display:flex;align-items:center">
            <div class="container" style="text-align:center">
                <div class="error-code anim-blur">404</div>
                <h1 class="page-title anim-blur">Page not <span class="gradient-text">found</span></h1>
                <p class="page-subtitle anim-blur">The page you're looking for doesn't exist or has been moved. Let's
                    get you back on track.</p>
                <div class="hero-ctas anim-blur" style="justify-content:center;margin-top:40px">
                    <a href="./" class="btn btn-primary btn-lg">Back to Home <span class="btn-arrow">→</span></a>
                    <a href="features/" class="btn btn-outline btn-lg">Explore Features</a>
                </div>
                <div class="error-links anim-blur">
                    <p style="margin-top:40px;color:rgba(255,255,255,0.5)">Popular pages:</p>
                    <div class="error-link-grid">
                        <a href="pricing/">Pricing</a>
                        <a href="about/">About</a>
                        <a href="contact/">Contact</a>
                        <a href="blog/">Blog</a>
                        <a href="docs/">Documentation</a>
                        <a href="changelog/">Changelog</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
